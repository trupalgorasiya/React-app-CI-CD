name: React CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React Application
        run: npm run build

      - name: build Application Image
        run: docker build -t react-cicd-app .

      - name: Run Container
        run: docker run -d -p 3000:3000 react-cicd-app

      - name: Push image on registory
        run: docker push trupalgorasiya/react-cicd-app